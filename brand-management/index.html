why:"Other brands attach through co-branding. Characters attach through licensing; celebrities through endorsement; events through sponsorship.",
big:"Each entity has its signature mechanism; scrambling them is a favorite exam trick. Memorize the entity→mechanism map.",
trap:"Characters→licensing (not sponsorship), celebrities→endorsement (not country cues), events→sponsorship (not licensing). Only other-brands→co-branding is right."},

{ch:9,diff:"Medium",q:"Brand audits are best scheduled:",
options:["Continuously, as a real-time daily data feed","Periodically, when setting or revisiting strategic direction","Only once, at the moment a brand is first launched","Exclusively during a merger or acquisition process"],answer:1,
why:"Audits are periodic deep-dives, run when the firm sets or reconsiders long-term strategic direction, not continuously.",
big:"Continuous, real-time monitoring is the job of TRACKING. The audit is the occasional comprehensive health check.",
trap:"Daily real-time data is tracking; a one-time launch check is too narrow. Audits recur periodically around strategic inflection points."},

{ch:1,diff:"Hard",q:"'Brand associations' and 'brand image' relate to each other such that:",
options:["Image and associations are two unrelated branches of knowledge","Associations are the building blocks that collectively form the image","Image sits below associations as a narrower sub-component","Associations exist only within awareness, not within image"],answer:1,
why:"Brand image is the set of perceptions reflected by the brand associations held in memory, associations are its building blocks.",
big:"Knowledge = Awareness + Image; Image is made up of associations (attributes, benefits, attitudes) with strength, favorability, uniqueness.",
trap:"Associations sit UNDER image (they compose it), not the reverse, and they belong to image, not awareness. This hierarchy is a flagged weak spot."},

{ch:2,diff:"Easy",q:"The purpose of establishing points-of-parity is largely to:",
options:["Give consumers a unique reason to prefer this brand","Negate competitors' PODs or establish category membership","Raise the brand's price above every competitor","Replace the need for any points-of-difference"],answer:1,
why:"POPs establish category membership and/or negate competitors' PODs (removing a reason NOT to choose you).",
big:"POPs get you into the game; PODs win it. A brand missing key POPs can be dismissed before its PODs even get considered.",
trap:"Unique reasons-to-prefer are PODs. POPs don't raise price or replace PODs; they clear the table-stakes so PODs can matter."},

{ch:3,diff:"Hard",q:"Which correctly maps a pyramid block to its brand-building STEP?",
options:["Salience corresponds to the meaning step of brand building","Performance and imagery correspond to the identity step","Judgments and feelings correspond to the response step","Resonance corresponds to the meaning step of brand building"],answer:2,
why:"Judgments + Feelings = the RESPONSE step ('what about you?'). The four steps: identity (salience), meaning (performance/imagery), response (judgments/feelings), relationship (resonance).",
big:"Each step answers a customer question: Who are you? What are you? What about you? and What about you and me?",
trap:"Salience is identity (not meaning); performance/imagery is meaning (not identity); resonance is relationship (not meaning). Only judgments/feelings→response is correct."},

{ch:4,diff:"Medium",q:"Protectability as a brand-element criterion has two senses, legal and competitive, meaning the element should be defensible both:",
options:["In court and against competitive imitation or genericization","In price and against retailer private-label copies","In memory and against consumer forgetting over time","In transfer and against cross-cultural misreading"],answer:0,
why:"Protectability = legally protectable (trademarkable) AND competitively protectable (resistant to being copied or becoming generic).",
big:"Names that become generic (aspirin, escalator) lost competitive protectability even where legal marks once existed, watch for genericide.",
trap:"The two senses are legal and competitive, not price/memory/transfer. Protectability guards ownership and distinctiveness, not recall or reach."},

{ch:5,diff:"Easy",q:"A pull strategy succeeds when:",
options:["Intermediaries are incentivized to stock and promote the brand","Consumer demand is strong enough to draw the product through the channel","The firm sells directly to regulators for approval","The product is priced below every competitor on the shelf"],answer:1,
why:"Pull works by building consumer demand so shoppers seek out the brand, pulling it through retailers who then must stock it.",
big:"Push targets the trade; pull targets the consumer. The strongest brands generate pull so intermediaries compete to carry them.",
trap:"Incentivizing intermediaries is PUSH. Pull is consumer-demand-driven, and it isn't about lowest price or regulators."},

{ch:8,diff:"Easy",q:"Which is one of the eight sources of secondary brand associations?",
options:["The firm's internal accounting department","Channels of distribution through channel strategy","The consumer's own prior purchase history","The brand's registered trademark filing"],answer:1,
why:"Channels of distribution (via channel strategy) is one of the eight sources, alongside company, country, other brands, characters, celebrities, events, third-party sources.",
big:"Where a brand is sold shapes its meaning; a prestige retailer lends prestige, a discount channel lends value connotations.",
trap:"Internal accounting, purchase history, and trademark filings aren't secondary-association sources. Channels of distribution is the listed one."},

{ch:9,diff:"Easy",q:"Which pillar of the measurement system is most concerned with SHORT-TERM tactical decisions?",
options:["Brand audit, the periodic strategic deep-dive","Brand tracking, the routine ongoing data collection","Brand charter, the internal guidelines document","Brand exploratory, the consumer perception study"],answer:1,
why:"Tracking collects routine (usually quantitative) data to support short-term, day-to-day tactical decisions.",
big:"Audit = long-term strategic; tracking = short-term tactical; management = internal governance. Match the tool to the time horizon.",
trap:"The audit (and its exploratory step) is strategic/periodic; the charter is governance. Only tracking is the short-term tactical feed."},

{ch:1,diff:"Easy",q:"Which is the clearest example of positive customer-based brand equity in action?",
options:["Two identical colas, but consumers prefer the named one when the brand is shown","A cola that costs less to manufacture than its competitor","A cola with a larger factory and wider distribution network","A cola whose trademark is registered in more countries"],answer:0,
why:"When consumers prefer the branded version of an identical product once the brand is revealed, that lift is CBBE in action.",
big:"The classic demonstration: blind vs identified taste tests where preference flips on brand reveal, knowledge changing response.",
trap:"Lower cost, bigger distribution, and more trademarks are firm-side facts, not demonstrations of the consumer-response lift that defines CBBE."},

{ch:2,diff:"Medium",q:"Which is the strongest sign that a chosen point-of-difference fails the DELIVERABILITY criterion?",
options:["Consumers say they don't want that benefit at all","Competitors already own that exact benefit in consumers' minds","The firm cannot actually provide the benefit profitably and credibly","The benefit is easy for any rival to copy immediately"],answer:2,
why:"Deliverability asks whether the firm can actually and credibly provide the benefit; if it can't, the POD fails on deliverability.",
big:"Desirability (consumers want it) and differentiation (it's distinct) are separate tests. A POD must pass all three D's.",
trap:"'Consumers don't want it' fails desirability; 'rivals own it/copy it' fails differentiation. Only 'the firm can't provide it' fails deliverability."},

{ch:3,diff:"Medium",q:"Brand superiority, as a judgment, specifically measures the extent to which customers view the brand as:",
options:["Easy to recall from the product category unaided","Unique and better than the other brands available","Emotionally warm and socially approved by peers","Widely distributed across many retail channels"],answer:1,
why:"Superiority measures whether customers see the brand as unique and better than competitors, a judgment sub-dimension.",
big:"Superiority is a strong preference signal, closely tied to whether PODs are landing as intended.",
trap:"Unaided recall is salience; warmth/social approval are feelings; distribution is a channel fact. Superiority is the 'unique and better' judgment."},

{ch:4,diff:"Medium",q:"Which brand element tends to be MOST difficult to change once established?",
options:["The logo, because it is visually distinctive","The slogan, because it appears in advertising","The brand name, because it is deeply encoded and entangled","The package, because it sits on the retail shelf"],answer:2,
why:"The brand name is hardest to change, deeply encoded in memory and tied to legal, commercial, and equity considerations.",
big:"Logos, slogans, and packaging are comparatively flexible; firms refresh them regularly without the upheaval of a name change.",
trap:"Logos, slogans, and packaging are all more changeable. The name is the sticky one, changing it risks severing existing equity."},

{ch:5,diff:"Hard",q:"A brand runs constant high-low promotions and finds consumers now buy only during deals. In value-chain/equity terms this reflects:",
options:["Strengthened behavioral loyalty through repeat deal purchases","Eroded perceived value as low prices reset reference points","Improved points-of-difference from the promotional excitement","Higher deliverability of the brand's core benefit"],answer:1,
why:"Chronic discounting resets consumers' internal reference prices downward and trains deal-seeking, eroding perceived value and equity.",
big:"This is exactly the pathology EDLP is designed to avoid; loyalty to the DEAL is not loyalty to the BRAND.",
trap:"Buying only on deal is not genuine behavioral loyalty, it's deal loyalty. And it weakens, not strengthens, perceived value and PODs."},

{ch:8,diff:"Medium",q:"Country-of-origin associations are LEAST likely to help when:",
options:["The country has a strong reputation for that product type","Consumers know little about the product and rely on cues","The country's image conflicts with the brand's desired positioning","The category is one the country is globally admired for"],answer:2,
why:"When the country's image conflicts with the desired positioning, the origin association hurts rather than helps.",
big:"Fit is everything in leverage: congruent origin lifts the brand; incongruent origin drags it or must be actively downplayed.",
trap:"Strong reputation, low consumer knowledge, and admired categories all HELP. Only a conflicting country image undermines the leverage."},

{ch:9,diff:"Medium",q:"Which best distinguishes qualitative from quantitative brand research in the exploratory?",
options:["Qualitative is judged on reliability and statistical validity","Qualitative is judged on direction, depth, and diversity of insight","Qualitative is always cheaper and faster with larger samples","Qualitative replaces the need for any tracking studies"],answer:1,
why:"Qualitative techniques are judged on direction, depth, and diversity, trading statistical rigor for richness and range.",
big:"Quantitative work (often in tracking) prizes reliability/validity and larger samples; qualitative work prizes depth of understanding.",
trap:"Reliability/validity are quantitative concerns. Qualitative doesn't rely on large samples and doesn't replace tracking."},

{ch:1,diff:"Medium",q:"Which is the best description of 'brand image'?",
options:["How easily the brand is recalled from the category","Consumer perceptions reflected by associations held in memory","The intended meaning the firm builds into its elements","The legal set of trademarks the firm has registered"],answer:1,
why:"Brand image = consumer perceptions of the brand as reflected by the brand associations held in memory.",
big:"Note the consumer-side framing: image is what's PERCEIVED, distinct from the firm's INTENDED meaning captured in the inventory.",
trap:"Ease of recall is awareness/salience; intended meaning is the inventory's firm-side view. Image is the perceived-association side."},

{ch:3,diff:"Medium",q:"Which sub-dimension belongs to brand IMAGERY (not performance)?",
options:["Product reliability, durability, and serviceability","User profiles and purchase/usage situations","Primary ingredients and supplementary features","Service efficiency, effectiveness, and empathy"],answer:1,
why:"Imagery includes user profiles, usage situations, personality/values, and history/heritage, the extrinsic, symbolic meanings.",
big:"Performance covers the intrinsic/functional (reliability, features, service quality); imagery covers the extrinsic/symbolic.",
trap:"Reliability, ingredients/features, and service quality are all PERFORMANCE. Only user/usage imagery is on the imagery side."},

{ch:2,diff:"Hard",q:"'Separating the attributes' as a fix for negatively correlated POP/PODs works by:",
options:["Persuading consumers the attributes can coexist in one product","Presenting each attribute in a different context or campaign","Acquiring a second brand that already holds both attributes","Dropping the attribute that performs worse in testing"],answer:1,
why:"Separating the attributes presents them in different contexts/communications so they don't directly collide in the consumer's mind.",
big:"It's one of three fixes: separate (compartmentalize), leverage (borrow another entity), or redefine (change the perceived link).",
trap:"Persuading coexistence is 'redefining'; acquiring a brand relates to 'leveraging.' Separating specifically compartmentalizes the two attributes."},

{ch:5,diff:"Medium",q:"Which of the following best exemplifies operating at the 'potential' product level?",
options:["Meeting the minimum features buyers already expect","Delivering the basic core benefit the customer buys","Exploring future transformations the offering might undergo","Providing the stripped-down generic version of the product"],answer:2,
why:"The potential product encompasses all the augmentations and transformations the offering might undergo in the future.",
big:"It's the frontier of innovation and differentiation, beyond even the augmented level, where tomorrow's PODs are invented.",
trap:"Minimum expected features = expected level; core benefit = core; generic version = generic. Only future transformations = potential."},

{ch:9,diff:"Hard",q:"A firm wants day-to-day data on awareness and key associations to steer this quarter's tactics. The correct tool is:",
options:["A full brand audit with inventory and exploratory","An ongoing brand tracking study, mostly quantitative","A one-time brand charter documenting guidelines","A brand valuation for the annual financial report"],answer:1,
why:"Routine, mostly quantitative day-to-day tactical data is exactly what brand tracking studies provide.",
big:"Audits are periodic and strategic; the charter is governance; valuation is financial. Only tracking fits the short-term tactical need.",
trap:"Running a full audit for quarterly tactics is overkill and mistimed. The charter and valuation don't provide ongoing tactical data. Tracking does."},

{ch:1,diff:"Easy",q:"Which of these is a consumer-side role of brands, per Keller?",
options:["Legal protection of unique product features via trademark","Identification of the source or maker of a product","A competitive advantage barrier the firm can defend","A financial asset recorded among intangible assets"],answer:1,
why:"Identifying the source/maker of a product is a consumer-side role, it tells the buyer who stands behind the offering.",
big:"Consumer roles: identification, risk reduction, search-cost reduction, quality signal, self-expression. Firm roles: legal protection, competitive advantage, financial value.",
trap:"Legal protection, competitive-advantage barriers, and financial-asset status are all FIRM-side roles. Source identification is the consumer-side one."},

{ch:4,diff:"Hard",q:"The 'offensive' brand-element criteria (used to BUILD equity) are:",
options:["Transferability, Adaptability, and Protectability","Memorability, Meaningfulness, and Likability","Desirability, Deliverability, and Differentiation","Direction, Depth, and Diversity"],answer:1,
why:"Memorability, Meaningfulness, and Likability are the offensive trio that actively build equity.",
big:"Transferability, adaptability, and protectability are the defensive trio that protect and extend equity once built.",
trap:"The three D's are POD criteria; Direction/Depth/Diversity are research criteria. Only memorability/meaningfulness/likability are the offensive element criteria."},

{ch:3,diff:"Easy",q:"Which correctly orders the FOUR brand-building steps (customer questions) from bottom to top?",
options:["What about you and me? → What about you? → What are you? → Who are you?","Who are you? → What are you? → What about you? → What about you and me?","What are you? → Who are you? → What about you and me? → What about you?","Who are you? → What about you? → What are you? → What about you and me?"],answer:1,
why:"Bottom to top: Who are you? (identity/salience) → What are you? (meaning) → What about you? (response) → What about you and me? (relationship/resonance).",
big:"The four questions map exactly onto the pyramid tiers and give you a fast way to reconstruct the whole model under exam pressure.",
trap:"The order climbs from identity to relationship. Any sequence that starts with the relationship question or scrambles the middle is inverted."},

{ch:8,diff:"Hard",q:"A brand with weak equity of its own benefits MOST from leveraging a strong secondary association when:",
options:["Consumers are experts who scrutinize every attribute closely","Consumers lack the motivation or ability to judge the product directly","The linked entity's image sharply conflicts with the brand","The brand already dominates the category on every metric"],answer:1,
why:"Borrowed associations do the most work when consumers can't or won't evaluate the product on its own merits, so they lean on the linked entity.",
big:"This is the core condition for leverage effectiveness; it's why endorsements and origin cues sway low-involvement categories most.",
trap:"Experts lean less on borrowed cues; conflicting images hurt; a dominant brand needs less help. Low motivation/ability is the sweet spot."},

{ch:9,diff:"Medium",q:"Which output belongs to the Brand Equity Management pillar (not the audit or tracking)?",
options:["The brand inventory cataloging how the brand is marketed","The brand exploratory uncovering consumer perceptions","The brand charter documenting guidelines and responsibilities","The routine quantitative tracking of awareness scores"],answer:2,
why:"The brand charter (with the brand equity report and defined responsibilities) belongs to the management pillar.",
big:"Management institutionalizes brand thinking: the charter sets rules, the equity report communicates status, responsibilities assign ownership.",
trap:"Inventory and exploratory are audit steps; awareness tracking is the tracking pillar. Only the charter is a management-pillar output."},

{ch:2,diff:"Medium",q:"Positioning should be changed:",
options:["Frequently, to keep pace with every market fluctuation","Infrequently and only when circumstances truly warrant it","Never, since a position must stay fixed forever","Only when a new CEO or agency takes over the brand"],answer:1,
why:"Positioning should be fundamentally changed infrequently, only when circumstances significantly reduce the effectiveness of existing POPs/PODs.",
big:"It can still evolve, refining, adding, or dropping a POP/POD, but wholesale repositioning is rare and risky.",
trap:"Not frequent (that's whiplash) and not never (positions must evolve). The rule is infrequent, evidence-driven change."},

{ch:1,diff:"Hard",q:"Which statement about brand awareness vs brand image is accurate?",
options:["Awareness is the content of memory; image is the strength of memory","Awareness is whether/how the brand comes to mind; image is what's linked to it","Awareness and image are synonyms in Keller's framework","Image precedes and produces awareness in the knowledge model"],answer:1,
why:"Awareness = whether and how readily the brand is evoked (recall/recognition, depth/breadth); image = the associations linked to it.",
big:"Both are branches of brand knowledge. You generally need awareness before image can matter, you can't hold associations to a brand you can't retrieve.",
trap:"They're not synonyms, and image doesn't produce awareness. Awareness is retrieval; image is the linked content. Keep the branches straight."},
];

/* ---- apply the deliberate re-anchor for the mantra question ---- */
BANK.forEach(q => { if (q._fixanswer) { /* answer already set correctly to index 0 */ delete q._fixanswer; } });

/* ---------- ENGINE ---------- */
const state = { i: 0, answered: 0, correct: 0, byCh: {}, byDiff: {}, picks: {} };
const LETTERS = ["A","B","C","D"];

const el = id => document.getElementById(id);
const KEY = "myexam:" + document.title;

function saveState(pos) {
  try { localStorage.setItem(KEY, JSON.stringify({ ...state, i: pos })); } catch(e) {}
}
function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(KEY));
    if (s && typeof s.i === "number") Object.assign(state, s);
    state.picks = state.picks || {};
  } catch(e) {}
}
function restart() {
  try { localStorage.removeItem(KEY); } catch(e) {}
  location.reload();
}

function updateDash() {
  const pct = state.answered ? Math.round(state.correct / state.answered * 100) : null;
  const scoreEl = el("dashscore");
  scoreEl.innerHTML = pct === null ? "Score <b>·</b>" : `Score <b>${pct}%</b>`;
  scoreEl.className = "dash-score" + (pct !== null && pct < 70 ? " low" : "");
  el("answered").textContent = `${state.correct}/${state.answered} correct`;

  const weak = Object.keys(state.byCh)
    .map(ch => ({ ch, ...state.byCh[ch] }))
    .filter(x => x.t >= 2 && x.c / x.t < 0.7)
    .sort((a, b) => a.c / a.t - b.c / b.t)
    .slice(0, 3);
  el("dashweak").textContent = weak.length ? "Weak: " + weak.map(x => "Ch " + x.ch).join(" · ") : "";

  const rows = Object.keys(state.byCh).sort((a, b) => a - b).map(ch => {
    const { c, t } = state.byCh[ch];
    const p = Math.round(c / t * 100);
    const col = p < 70 ? "var(--oxblood)" : "var(--green)";
    return `<div class="row"><span>Chapter ${ch}</span><div class="bar"><i style="width:${p}%; background:${col}"></i></div><span class="frac">${c}/${t} · ${p}%</span></div>`;
  }).join("");
  el("livebd").innerHTML = rows || `<div class="row"><span>Answer a question and your per chapter accuracy shows here, updated live.</span></div>`;
}

function render() {
  const q = BANK[state.i];
  el("clock").textContent = `Q${state.i+1} / ${BANK.length}`;
  el("railfill").style.width = ((state.i)/BANK.length*100) + "%";
  updateDash();

  const diffClass = q.diff.toLowerCase();
  el("qhead").innerHTML =
    `<span class="chip ch">Ch ${q.ch}</span>` +
    `<span class="chip ${diffClass}">${q.diff}</span>` +
    `<span class="chip">#${state.i+1}</span>`;
  el("qtext").textContent = q.q;

  const opts = el("opts");
  opts.innerHTML = "";
  q.options.forEach((text, idx) => {
    const b = document.createElement("button");
    b.className = "opt";
    b.innerHTML = `<span class="mark">${LETTERS[idx]}</span>${text}`;
    b.onclick = () => choose(idx);
    opts.appendChild(b);
  });

  const v = el("verdict"); v.className = "verdict"; v.textContent = "";
  const ex = el("explain"); ex.className = "explain"; ex.innerHTML = "";
  el("next").className = "next";
  el("next").textContent = state.i === BANK.length-1 ? "See results →" : "Next →";
  el("back").style.visibility = state.i > 0 ? "visible" : "hidden";
  if (state.picks[state.i] !== undefined) paint(state.picks[state.i], true);
}

function paint(idx, review) {
  const q = BANK[state.i];
  const correct = q.answer;
  const buttons = [...el("opts").children];
  buttons.forEach((b,i) => {
    b.disabled = true;
    if (i === correct) {
      // inline !important so the highlight renders in BOTH light and dark mode
      b.style.setProperty("border-color", "#33b57e", "important");
      b.style.setProperty("background", "rgba(51,181,126,0.16)", "important");
      b.querySelector(".mark").style.setProperty("border-color", "#33b57e", "important");
      b.querySelector(".mark").style.setProperty("color", "#33b57e", "important");
    }
    if (i === idx && idx !== correct) {
      b.style.setProperty("border-color", "#e05b5b", "important");
      b.style.setProperty("background", "rgba(224,91,91,0.13)", "important");
      b.querySelector(".mark").style.setProperty("border-color", "#e05b5b", "important");
      b.querySelector(".mark").style.setProperty("color", "#e05b5b", "important");
    }
  });

  const wasRight = idx === correct;
  const v = el("verdict");
  v.className = "verdict show " + (wasRight ? "right" : "wrong");
  v.textContent = (wasRight
    ? "✓ Correct."
    : `✗ Wrong. The correct answer (${LETTERS[correct]}) is highlighted above.`)
    + (review ? " Submitted and locked." : "");

  // context-sensitive first panel
  const firstPanel = wasRight
    ? `<div class="panel correct-why"><p class="plabel">Why this is correct</p><p>${q.why}</p></div>`
    : `<div class="panel wrong-why"><p class="plabel">Why your answer was wrong</p><p>You picked ${LETTERS[idx]}. ${q.why}</p></div>`;

  el("explain").innerHTML =
    firstPanel +
    `<div class="panel bigger"><p class="plabel">Bigger picture</p><p>${q.big}</p></div>` +
    `<div class="panel trap"><p class="plabel">Exam trap to avoid</p><p>${q.trap}</p></div>` +
    (q.insight ? `<div class="panel insight"><p class="plabel">Go deeper</p><p>${q.insight}</p></div>` : "");
  el("explain").className = "explain show";
  el("next").className = "next show";
}

function choose(idx) {
  if (state.picks[state.i] !== undefined) return;
  const q = BANK[state.i];
  const wasRight = idx === q.answer;
  state.picks[state.i] = idx;
  state.answered++;
  if (wasRight) state.correct++;
  state.byCh[q.ch] = state.byCh[q.ch] || {c:0,t:0};
  state.byCh[q.ch].t++; if (wasRight) state.byCh[q.ch].c++;
  state.byDiff[q.diff] = state.byDiff[q.diff] || {c:0,t:0};
  state.byDiff[q.diff].t++; if (wasRight) state.byDiff[q.diff].c++;
  paint(idx, false);
  updateDash();
  saveState(state.i);
}

el("next").onclick = () => {
  if (state.i === BANK.length-1) { saveState(BANK.length); showResults(); return; }
  state.i++;
  saveState(state.i);
  render();
  window.scrollTo({top:0, behavior:"smooth"});
};

el("back").onclick = () => {
  if (state.i === 0) return;
  state.i--;
  saveState(state.i);
  render();
  window.scrollTo({top:0, behavior:"smooth"});
};

el("dashtoggle").onclick = () => {
  const on = el("livebd").classList.toggle("show");
  el("dashtoggle").textContent = on ? "Chapters ▴" : "Chapters ▾";
};

function showResults() {
  el("quizcard").style.display = "none";
  updateDash();
  el("railfill").style.width = "100%";
  const pct = Math.round(state.correct / BANK.length * 100);
  let tag;
  if (pct >= 90) tag = "Exam-ready. Locked in.";
  else if (pct >= 80) tag = "Strong. Tighten the edge cases.";
  else if (pct >= 70) tag = "Solid base, gaps to close.";
  else if (pct >= 60) tag = "Shaky. Another pass needed.";
  else tag = "Back to the chapters first.";

  const chRows = Object.keys(state.byCh).sort((a,b)=>a-b).map(ch => {
    const {c,t} = state.byCh[ch];
    const p = Math.round(c/t*100);
    return `<div class="row"><span>Chapter ${ch}</span><div class="bar"><i style="width:${p}%"></i></div><span class="frac">${c}/${t}</span></div>`;
  }).join("");

  const order = ["Easy","Medium","Hard"];
  const dRows = order.filter(d=>state.byDiff[d]).map(d => {
    const {c,t} = state.byDiff[d];
    const p = Math.round(c/t*100);
    return `<div class="row"><span>${d}</span><div class="bar"><i style="width:${p}%"></i></div><span class="frac">${c}/${t}</span></div>`;
  }).join("");

  // weakest chapters callout
  const weakest = Object.keys(state.byCh)
    .map(ch => ({ch, r: state.byCh[ch].c/state.byCh[ch].t}))
    .sort((a,b)=>a.r-b.r).slice(0,3)
    .filter(x => x.r < 1)
    .map(x => `Ch ${x.ch}`);
  const weakHtml = weakest.length
    ? `<div class="weak">Spend your next pass on <b>${weakest.join(", ")}</b> — that's where the points leaked.</div>`
    : `<div class="weak">Clean sweep across chapters. Nothing obvious to re-drill.</div>`;

  el("results").innerHTML =
    `<p class="eyebrow" style="color:var(--brass)">Results</p>` +
    `<div class="score-big">${pct}<small>%</small></div>` +
    `<div class="score-tag">${state.correct} of ${BANK.length} correct · ${tag}</div>` +
    `<div class="bd-title">By chapter</div>${chRows}` +
    `<div class="bd-title">By difficulty</div>${dRows}` +
    weakHtml +
    `<button class="restart" onclick="restart()">Restart drill</button>`;
  el("results").className = "card results show";
  window.scrollTo({top:0, behavior:"smooth"});
}

loadState();
if (state.i >= BANK.length) { showResults(); } else { render(); }
</script>
</body>
</html>
